# =============================================================================
# proan-Hidrocarburos — stack LOCAL de DESARROLLO (gestión de facturas de gas)
#
# 3 contenedores (frente a los ~15 del monorepo de Maka):
#   carb-nginx-dev       reverse proxy (http :8080)
#   carb-frontend-dev    Next.js (Hidrocarburos, auth por .htpasswd)
#   carb-financialbi-dev backend FastAPI (BigQuery)
#
# Sin gateway, auth-service, postgres, redis, celery, workers, weaviate.
#
# Arranque (desde la raíz del repo):
#   # coloca la service-account BigQuery en config/bq_credentials.json
#   docker compose -f deploy/docker-compose.dev.yml up --build
#   # → http://localhost:8080   (admin / carburos2026)
# =============================================================================

name: carb

services:
  carb-financialbi-dev:
    container_name: carb-financialbi-dev
    image: carb-financialbi:dev
    build:
      context: ..
      dockerfile: apps/financialbi/Dockerfile
    expose:
      - "8091"
    env_file:
      - ../config/financialbi.env
    environment:
      - ENV=development
    volumes:
      # Hot-reload: monta solo el paquete (preserva la .venv de la imagen).
      - ../apps/financialbi/financialbi:/app/apps/financialbi/financialbi
      # Credenciales BigQuery (config/bq_credentials.json → BQ_CREDENTIALS_PATH).
      - ../config:/app/config:ro
    command: >
      uvicorn financialbi.app:app --host 0.0.0.0 --port 8091
      --reload --reload-dir /app/apps/financialbi/financialbi
    networks:
      - carb_net
    restart: unless-stopped

  carb-frontend-dev:
    container_name: carb-frontend-dev
    image: carb-frontend:dev
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    expose:
      - "3000"
    depends_on:
      - carb-financialbi-dev
    environment:
      - FINANCIALBI_SERVICE_URL=http://carb-financialbi-dev:8091
      - HTPASSWD_PATH=/etc/carb/.htpasswd
      - SESSION_COOKIE_NAME=carb_session
      - SESSION_COOKIE_SECURE=false
      # Bind mounts en Windows no propagan eventos de fichero → sin polling
      # next dev no recompila los cambios.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ../apps/frontend/app:/app/apps/frontend/app
      - ../apps/frontend/src:/app/apps/frontend/src
      - ../apps/frontend/client.config.ts:/app/apps/frontend/client.config.ts
      - ../apps/frontend/next.config.mjs:/app/apps/frontend/next.config.mjs
      # Usuarios (bcrypt) — editable en caliente sin rebuild.
      - ./nginx/.htpasswd:/etc/carb/.htpasswd:ro
    networks:
      - carb_net
    restart: unless-stopped

  carb-nginx-dev:
    container_name: carb-nginx-dev
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - carb-frontend-dev
    networks:
      - carb_net
    restart: unless-stopped

networks:
  carb_net:
    name: carb_net
