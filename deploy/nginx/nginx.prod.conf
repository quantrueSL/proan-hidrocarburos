# Nginx PRODUCCIÓN — reverse proxy del frontend con TLS.
#
# PLANTILLA: ajusta server_name y las rutas de los certificados (montados en
# /etc/ssl vía docker-compose.prod.yml → ./nginx/ssl). El frontend gestiona su
# propia auth (cookie de sesión), así que nginx solo termina TLS y enruta.

resolver 127.0.0.11 valid=10s ipv6=off;

client_max_body_size 100M;
proxy_connect_timeout 300s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;
proxy_buffering off;
proxy_request_buffering off;

# HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hidrocarburos.example.com;   # <-- AJUSTAR

    ssl_certificate     /etc/ssl/carb_bundle.crt;   # <-- AJUSTAR
    ssl_certificate_key /etc/ssl/carb.key;          # <-- AJUSTAR

    location / {
        set $frontend http://carb-frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
