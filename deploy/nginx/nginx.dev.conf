# Nginx DESARROLLO — reverse proxy del frontend (http en :80 → host 8080).
#
# El frontend React gestiona su propia auth (cookie de sesión http-only que
# fija /api/auth/login tras verificar el .htpasswd). Por eso, a diferencia del
# nginx de Maka (que hacía auth_basic para Streamlit), aquí NO hay auth_basic
# ni auth_request: nginx solo enruta.

# Resolver DNS de docker: re-resuelve el hostname del contenedor en cada
# request (evita 502 si el contenedor se recrea con otra IP).
resolver 127.0.0.11 valid=10s ipv6=off;

client_max_body_size 100M;
proxy_connect_timeout 300s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;
proxy_buffering off;
proxy_request_buffering off;

server {
    listen 80;
    server_name _;

    location / {
        # Variable → fuerza re-resolución en cada request.
        set $frontend http://carb-frontend-dev:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        # WebSocket para el hot-reload (HMR) de next dev.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment "development";
    }
}
